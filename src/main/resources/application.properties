# ============================================
# Server
# ============================================
server.port=8080

# ============================================
# MySQL Datasource
# Update the username/password to match your local MySQL setup.
# The database "portfolio_db" is created by database/schema.sql
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseselfNotExist=true
spring.datasource.username=root
spring.datasource.password=1111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate
# "update" will create/alter tables from the entity classes automatically.
# Switch to "validate" once your schema is stable.
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# CORS - allowed origin for the plain HTML/CSS/JS frontend
# (adjust if you serve the frontend from a different port)
# ============================================
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000
